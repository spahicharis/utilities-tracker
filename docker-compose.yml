services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      BACKEND_PORT: 5007
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-5007}:5007"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-8080}:80"
    restart: unless-stopped
